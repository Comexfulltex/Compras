<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Compras — Telas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e0dbd2;
    --text: #1a1814;
    --text2: #6b6560;
    --text3: #9e9890;
    --accent: #1a1814;
    --blue-bg: #e8f0fb; --blue-txt: #1a4a9e;
    --green-bg: #e4f4e0; --green-txt: #1e6b18;
    --amber-bg: #fef3d8; --amber-txt: #8a5a00;
    --red-bg: #fde8e8; --red-txt: #9e1a1a;
    --purple-bg: #ede8fb; --purple-txt: #4a1a9e;
    --teal-bg: #e0f4f0; --teal-txt: #0e6b5a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand { font-weight: 600; font-size: 15px; letter-spacing: -0.3px; }
  .brand span { color: var(--text2); font-weight: 400; }
  .sheets-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    text-decoration: none;
    transition: all .15s;
  }
  .sheets-btn:hover { background: var(--surface2); color: var(--text); }
  .sheets-btn svg { width: 14px; height: 14px; }

  /* ── NAV TABS ── */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    gap: 0;
  }
  .tab {
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }

  /* ── LAYOUT ── */
  main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── METRICS ── */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .metric-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }
  .metric-value {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .metric-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }
  .metric-value.danger { color: #c0392b; }
  .metric-value.warn { color: #8a5a00; }

  /* ── FILTERS ── */
  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 1rem;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .filter-group select,
  .filter-group input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    cursor: pointer;
    min-width: 140px;
  }
  .filter-group select:hover,
  .filter-group input:hover { border-color: #c0b8ae; }
  .filter-group select:focus,
  .filter-group input:focus { border-color: var(--text); background: var(--surface); }

  .clear-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    align-self: flex-end;
  }
  .clear-btn:hover { background: var(--surface2); }

  .filter-summary {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }
  .filter-summary b { color: var(--text2); font-weight: 500; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }
  thead { background: var(--surface2); }
  th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th.sort-asc::after { content: ' ↑'; }
  th.sort-desc::after { content: ' ↓'; }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #faf9f6; }
  .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
  .muted { color: var(--text2); }

  /* ── BADGES ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .badge-despachado { background: var(--green-bg); color: var(--green-txt); }
  .badge-despachado::before { background: var(--green-txt); }
  .badge-puerto { background: var(--blue-bg); color: var(--blue-txt); }
  .badge-puerto::before { background: var(--blue-txt); }
  .badge-pendiente { background: var(--amber-bg); color: var(--amber-txt); }
  .badge-pendiente::before { background: var(--amber-txt); }
  .badge-demorado { background: var(--red-bg); color: var(--red-txt); }
  .badge-demorado::before { background: var(--red-txt); }
  .badge-transito { background: var(--purple-bg); color: var(--purple-txt); }
  .badge-transito::before { background: var(--purple-txt); }

  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .tag-hogar { background: var(--teal-bg); color: var(--teal-txt); border-color: transparent; }
  .tag-moda { background: var(--purple-bg); color: var(--purple-txt); border-color: transparent; }
  .tag-basicos { background: var(--green-bg); color: var(--green-txt); border-color: transparent; }
  .tag-cotillon { background: var(--amber-bg); color: var(--amber-txt); border-color: transparent; }

  /* ── DASHBOARD CHARTS ── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  @media (max-width: 900px) { .grid2, .grid3 { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 1rem;
  }

  /* bar charts */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .bar-label { font-size: 12px; color: var(--text2); min-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; min-width: 40px; transition: width .4s ease; }
  .bar-fill span { font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace; color: rgba(255,255,255,.9); white-space: nowrap; }

  /* estado donut */
  .donut-wrap { display: flex; align-items: center; gap: 1rem; }
  .donut-legend { flex: 1; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 12px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { flex: 1; color: var(--text2); }
  .legend-val { font-weight: 500; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text); }

  /* ── TIMELINE ── */
  .timeline { position: relative; }
  .timeline-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .timeline-item:last-child { border-bottom: none; }
  .tl-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 80px; padding-top: 2px; }
  .tl-body { flex: 1; }
  .tl-title { font-weight: 500; font-size: 13px; margin-bottom: 2px; }
  .tl-sub { font-size: 12px; color: var(--text2); }
  .tl-meta { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
  .tl-meta span { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .tl-meta b { color: var(--text2); }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; }

  /* ── FOB EVOLUTION (mini sparklines) ── */
  .fob-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .fob-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .fob-tela { font-weight: 500; font-size: 13px; }
  .fob-prov { font-size: 11px; color: var(--text3); }
  .fob-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .fob-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .fob-chip span { color: var(--text); font-weight: 500; }

  /* scrollable table for narrow screens */
  .table-scroll { overflow-x: auto; }
</style>
</head>

<header>
  <div class="brand">Compras <span>/ Telas</span></div>

</header>

<nav>
  <button class="tab active" onclick="switchTab('fobs',this)">FOBs por tela</button>
  <button class="tab" onclick="switchTab('estado',this)">Estado de compras</button>
  <button class="tab" onclick="switchTab('evolucion',this)">Evolución FOB</button>
</nav>

<main>

  <!-- ═══ TAB 1: FOBs por tela ═══ -->
  <div id="fobs" class="section active">
    <div class="filters">
      <div class="filter-group">
        <label>Tela / artículo</label>
        <select id="f-tela" onchange="renderFobs()"><option value="">Todas</option></select>
      </div>
      <div class="filter-group">
        <label>Proveedor</label>
        <select id="f-prov" onchange="renderFobs()"><option value="">Todos</option></select>
      </div>
      <button class="clear-btn" onclick="clearFilters()">✕ Limpiar</button>
    </div>

    <div class="filter-summary" id="fobs-summary"></div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <colgroup>
            <col style="width:110px">
            <col style="width:200px">
            <col style="width:110px">
            <col style="width:180px">
            <col style="width:90px">
            <col style="width:130px">
            <col style="width:90px">
            <col style="width:110px">
          </colgroup>
          <thead>
            <tr>
              <th class="sortable" onclick="sortTable('_fecha_sort')">F. Compra</th>
              <th class="sortable" onclick="sortTable('tela')">Tela</th>
              <th>Grupo color</th>
              <th class="sortable" onclick="sortTable('proveedor')">Proveedor</th>
              <th class="sortable" onclick="sortTable('fob_unit')">FOB unit.</th>
              <th>N° Orden</th>
              <th>Unidad</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="fobs-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══ TAB 2: Estado ═══ -->
  <div id="estado" class="section">
    <div class="metrics-row" id="metrics-row"></div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">FOB total por proveedor (USD)</div>
        <div id="chart-proveedor"></div>
      </div>
      <div class="card">
        <div class="card-title">Unidades por estado</div>
        <div id="chart-estado-bars"></div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">FOB por categoría (Moda / Commodities)</div>
        <div id="chart-categoria"></div>
      </div>
      <div class="card">
        <div class="card-title">FOB por estacionalidad</div>
        <div id="chart-estacionalidad"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Próximos arribos (ordenados por fecha)</div>
      <div id="timeline-arribos"></div>
    </div>
  </div>

  <!-- ═══ TAB 3: Evolución FOB ═══ -->
  <div id="evolucion" class="section">
    <div class="filters" style="margin-bottom:1rem;">
      <div class="filter-group">
        <label>Buscar tela</label>
        <input type="text" id="e-search" placeholder="ej: Stella, Ketten..." oninput="renderEvolucion()" style="min-width:200px;">
      </div>
      <div class="filter-group">
        <label>Proveedor</label>
        <select id="e-prov" onchange="renderEvolucion()"><option value="">Todos</option></select>
      </div>
      <div class="filter-group">
        <label>Fecha compra desde</label>
        <input type="date" id="e-desde" onchange="renderEvolucion()">
      </div>
      <div class="filter-group">
        <label>Hasta</label>
        <input type="date" id="e-hasta" onchange="renderEvolucion()">
      </div>
      <button class="clear-btn" onclick="clearEvolucion()">✕ Limpiar</button>
    </div>
    <div class="filter-summary" id="evol-summary"></div>
    <div id="evol-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:1rem;"></div>
  </div>

</main>

// parse dates dd/mm/yyyy → yyyy-mm-dd for comparison
function parseDate(s) {
  const [d,m,y] = s.split('/'); return `${y}-${m}-${d}`;
}
function formatDate(s) { return s; }
function fmt(n) { return n.toLocaleString('es-AR'); }
function fmtUSD(n) { return 'USD ' + Math.round(n).toLocaleString('es-AR'); }

const DATA = RAW.map(r => ({
  fecha: r[0], tela: r[1], color: r[2], fob_unit: r[3],
  orden: r[4], proveedor: r[5], estado: r[6], arribo: r[7],
  codun: r[8], estacionalidad: r[9], categoria: r[10],
  unidad: r[11], rollos: r[12], cant_est: r[13], fob_total: r[14],
  _fecha_sort: parseDate(r[0]), _arribo_sort: parseDate(r[7])
}));

let sortCol = '_fecha_sort', sortDir = -1;

function sortTable(col) {
  if(sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  document.querySelectorAll('th.sortable').forEach(t => t.classList.remove('sort-asc','sort-desc'));
  event.target.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
  renderFobs();
}

// ── POPULATE FILTERS ──
function uniq(arr) { return [...new Set(arr)].sort(); }
function populateFilters() {
  const selectors = {
    'f-tela': uniq(DATA.map(d=>d.tela)),
    'f-prov': uniq(DATA.map(d=>d.proveedor)),
    'e-prov': uniq(DATA.map(d=>d.proveedor)),
  };
  for(const [id, vals] of Object.entries(selectors)) {
    const el = document.getElementById(id); if(!el) continue;
    vals.forEach(v => { const o = document.createElement('option'); o.value=v; o.textContent=v; el.appendChild(o); });
  }
  // Fechas para evolución
  const dates = DATA.map(d=>d._fecha_sort).sort();
  document.getElementById('e-desde').value = dates[0];
  document.getElementById('e-hasta').value = dates[dates.length-1];
}

function clearFilters() {
  ['f-tela','f-prov'].forEach(id => document.getElementById(id).value='');
  renderFobs();
}

function getFiltered() {
  const tela = document.getElementById('f-tela').value;
  const prov = document.getElementById('f-prov').value;
  return DATA.filter(d => {
    if(tela && d.tela !== tela) return false;
    if(prov && d.proveedor !== prov) return false;
    return true;
  }).sort((a,b) => {
    const va = a[sortCol] ?? 0, vb = b[sortCol] ?? 0;
    return va < vb ? sortDir : va > vb ? -sortDir : 0;
  });
}

function badgeClass(estado) {
  const map = { 'Despachado':'badge-despachado','Puerto':'badge-puerto','Pendiente':'badge-pendiente','Demorado':'badge-demorado','En tránsito':'badge-transito' };
  return map[estado] || 'badge-pendiente';
}
function tagClass(cat) {
  const map = { 'Hogar':'tag-hogar','Moda':'tag-moda','Basicos':'tag-basicos','Cotillon':'tag-cotillon' };
  return map[cat] || '';
}

// ── RENDER TAB 1 ──
function renderFobs() {
  const data = getFiltered();
  const tbody = document.getElementById('fobs-tbody');
  if(!data.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-state">Sin resultados para los filtros aplicados</td></tr>`;
    document.getElementById('fobs-summary').textContent = '';
    return;
  }

  // Agrupar por orden+tela para detectar si el FOB varía
  const grupos = {};
  data.forEach(d => {
    const key = d.orden + '||' + d.tela;
    if(!grupos[key]) grupos[key] = [];
    grupos[key].push(d);
  });

  // Construir filas: colapsar si todos los FOBs del grupo son iguales
  const rows = [];
  // Mantener orden original usando el primer elemento de cada grupo
  const seen = new Set();
  data.forEach(d => {
    const key = d.orden + '||' + d.tela;
    if(seen.has(key)) return;
    seen.add(key);
    const grupo = grupos[key];
    const fobs = grupo.map(g => g.fob_unit);
    const todosIguales = fobs.every(f => f === fobs[0]);
    if(todosIguales) {
      // Una sola fila, sin grupo color
      rows.push(`
        <tr>
          <td class="mono muted">${d.fecha}</td>
          <td style="font-weight:500">${d.tela}</td>
          <td class="muted" style="font-size:12px;color:var(--text3)">—</td>
          <td class="muted">${d.proveedor}</td>
          <td class="mono" style="font-weight:600">$${d.fob_unit.toFixed(2)}</td>
          <td class="mono muted" style="font-size:11px">${d.orden}</td>
          <td><span class="tag">${d.unidad}</span></td>
          <td><span class="badge ${badgeClass(d.estado)}">${d.estado}</span></td>
        </tr>`);
    } else {
      // Una fila por cada variante de color con su FOB
      grupo.forEach(g => {
        rows.push(`
          <tr>
            <td class="mono muted">${g.fecha}</td>
            <td style="font-weight:500">${g.tela}</td>
            <td><span class="tag">${g.color}</span></td>
            <td class="muted">${g.proveedor}</td>
            <td class="mono" style="font-weight:600">$${g.fob_unit.toFixed(2)}</td>
            <td class="mono muted" style="font-size:11px">${g.orden}</td>
            <td><span class="tag">${g.unidad}</span></td>
            <td><span class="badge ${badgeClass(g.estado)}">${g.estado}</span></td>
          </tr>`);
      });
    }
  });

  tbody.innerHTML = rows.join('');
  const totalFob = data.reduce((s,d)=>s+d.fob_total,0);
  const totalRollos = data.reduce((s,d)=>s+d.rollos,0);
  const filasVisibles = rows.length;
  document.getElementById('fobs-summary').innerHTML =
    `<b>${filasVisibles}</b> filas · <b>${fmt(totalRollos)}</b> rollos · FOB total <b>${fmtUSD(totalFob)}</b>`;
}

// ── RENDER TAB 2 ──
function renderEstado() {
  const total = DATA.length;
  const totalFob = DATA.reduce((s,d)=>s+d.fob_total,0);
  const totalRollos = DATA.reduce((s,d)=>s+d.rollos,0);
  const estados = {};
  DATA.forEach(d=>{ estados[d.estado]=(estados[d.estado]||0)+1; });
  const desp = estados['Despachado']||0;
  const puerto = estados['Puerto']||0;
  const otros = total - desp - puerto;

  document.getElementById('metrics-row').innerHTML = `
    <div class="metric"><div class="metric-label">Total filas</div><div class="metric-value">${total}</div><div class="metric-sub">${Object.keys(estados).length} estados distintos</div></div>
    <div class="metric"><div class="metric-label">FOB total</div><div class="metric-value" style="font-size:18px">USD ${Math.round(totalFob/1000)}k</div><div class="metric-sub">${fmt(Math.round(totalFob))} exacto</div></div>
    <div class="metric"><div class="metric-label">Total rollos</div><div class="metric-value">${fmt(totalRollos)}</div><div class="metric-sub">todas las órdenes</div></div>
    <div class="metric"><div class="metric-label">Despachado</div><div class="metric-value">${desp}</div><div class="metric-sub">${Math.round(desp/total*100)}% del total</div></div>
    <div class="metric"><div class="metric-label">En puerto</div><div class="metric-value warn">${puerto}</div><div class="metric-sub">pendiente retiro</div></div>
    <div class="metric"><div class="metric-label">Proveedores</div><div class="metric-value">${uniq(DATA.map(d=>d.proveedor)).length}</div><div class="metric-sub">activos</div></div>
  `;

  // bar: por proveedor
  const provMap = {};
  DATA.forEach(d=>{ provMap[d.proveedor]=(provMap[d.proveedor]||0)+d.fob_total; });
  const maxP = Math.max(...Object.values(provMap));
  const PCOLS = ['#1a4a9e','#1e6b18','#8a5a00','#9e1a1a','#4a1a9e','#0e6b5a','#6b1a6b'];
  let pi=0;
  document.getElementById('chart-proveedor').innerHTML = Object.entries(provMap)
    .sort((a,b)=>b[1]-a[1]).map(([p,v])=>`
    <div class="bar-row">
      <div class="bar-label" title="${p}">${p}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.max(8,Math.round(v/maxP*100))}%;background:${PCOLS[pi++%PCOLS.length]}">
          <span>${fmtUSD(v)}</span>
        </div>
      </div>
    </div>`).join('');

  // bar: por estado (rollos)
  const estMap = {};
  DATA.forEach(d=>{ estMap[d.estado]=(estMap[d.estado]||0)+d.rollos; });
  const maxE = Math.max(...Object.values(estMap));
  const ECOLS = { 'Despachado':'#1e6b18','Puerto':'#1a4a9e','Pendiente':'#8a5a00','Demorado':'#9e1a1a','En tránsito':'#4a1a9e' };
  document.getElementById('chart-estado-bars').innerHTML = Object.entries(estMap)
    .sort((a,b)=>b[1]-a[1]).map(([e,v])=>`
    <div class="bar-row">
      <div class="bar-label">${e}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.max(8,Math.round(v/maxE*100))}%;background:${ECOLS[e]||'#6b6560'}">
          <span>${fmt(v)} rollos</span>
        </div>
      </div>
    </div>`).join('');

  // bar: por categoria
  const catMap = {};
  DATA.forEach(d=>{ catMap[d.categoria]=(catMap[d.categoria]||0)+d.fob_total; });
  const maxC = Math.max(...Object.values(catMap));
  const CCOLS = { 'Hogar':'#0e6b5a','Moda':'#4a1a9e','Basicos':'#1e6b18','Cotillon':'#8a5a00' };
  document.getElementById('chart-categoria').innerHTML = Object.entries(catMap)
    .sort((a,b)=>b[1]-a[1]).map(([c,v])=>`
    <div class="bar-row">
      <div class="bar-label">${c}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.max(8,Math.round(v/maxC*100))}%;background:${CCOLS[c]||'#6b6560'}">
          <span>${fmtUSD(v)}</span>
        </div>
      </div>
    </div>`).join('');

  // bar: por estacionalidad
  const estacMap = {};
  DATA.forEach(d=>{ estacMap[d.estacionalidad]=(estacMap[d.estacionalidad]||0)+d.fob_total; });
  const maxES = Math.max(...Object.values(estacMap));
  const ESCOLS = { 'ANUAL':'#1a4a9e','INVIERNO':'#4a1a9e','VERANO':'#8a5a00' };
  document.getElementById('chart-estacionalidad').innerHTML = Object.entries(estacMap)
    .sort((a,b)=>b[1]-a[1]).map(([e,v])=>`
    <div class="bar-row">
      <div class="bar-label">${e}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.max(8,Math.round(v/maxES*100))}%;background:${ESCOLS[e]||'#6b6560'}">
          <span>${fmtUSD(v)}</span>
        </div>
      </div>
    </div>`).join('');

  // timeline arribs
  const upcoming = [...DATA]
    .sort((a,b)=>a._arribo_sort.localeCompare(b._arribo_sort))
    .slice(0,20);
  document.getElementById('timeline-arribos').innerHTML = upcoming.map(d=>`
    <div class="timeline-item">
      <div class="tl-date">${d.arribo}</div>
      <div class="tl-body">
        <div class="tl-title">${d.tela} <span class="muted" style="font-weight:400">· ${d.color}</span></div>
        <div class="tl-sub">${d.proveedor} · ${d.orden} · ${d.codun}</div>
        <div class="tl-meta">
          <span><b>${fmt(d.rollos)}</b> rollos</span>
          <span><b>${fmt(d.cant_est)}</b> ${d.unidad.toLowerCase()}</span>
          <span><b>$${d.fob_unit.toFixed(2)}</b> FOB unit.</span>
          <span><b>${fmtUSD(d.fob_total)}</b> total</span>
        </div>
      </div>
      <span class="badge ${badgeClass(d.estado)}">${d.estado}</span>
    </div>`).join('');
}

function clearEvolucion() {
  document.getElementById('e-search').value = '';
  document.getElementById('e-prov').value = '';
  const dates = DATA.map(d=>d._fecha_sort).sort();
  document.getElementById('e-desde').value = dates[0];
  document.getElementById('e-hasta').value = dates[dates.length-1];
  renderEvolucion();
}

// ── RENDER TAB 3: Evolución FOB ──
const evolCharts = {};

function renderEvolucion() {
  const search = (document.getElementById('e-search').value||'').toLowerCase();
  const prov = document.getElementById('e-prov').value;
  const desde = document.getElementById('e-desde').value;
  const hasta = document.getElementById('e-hasta').value;
  let data = DATA;
  if(prov) data = data.filter(d=>d.proveedor===prov);
  if(search) data = data.filter(d=>d.tela.toLowerCase().includes(search));
  if(desde) data = data.filter(d=>d._fecha_sort >= desde);
  if(hasta) data = data.filter(d=>d._fecha_sort <= hasta);

  // Agrupar por tela → por color → puntos en el tiempo
  const telas = {};
  data.forEach(d => {
    if(!telas[d.tela]) telas[d.tela] = { proveedores: new Set(), colores: {} };
    telas[d.tela].proveedores.add(d.proveedor);
    if(!telas[d.tela].colores[d.color]) telas[d.tela].colores[d.color] = [];
    // Evitar duplicados por misma fecha+color+fob
    const existe = telas[d.tela].colores[d.color].find(p => p.fecha === d._fecha_sort && p.fob === d.fob_unit);
    if(!existe) telas[d.tela].colores[d.color].push({ fecha: d._fecha_sort, label: d.fecha, fob: d.fob_unit });
  });

  const telaKeys = Object.keys(telas).sort();
  document.getElementById('evol-summary').innerHTML = `<b>${telaKeys.length}</b> telas encontradas`;

  if(!telaKeys.length) {
    document.getElementById('evol-cards').innerHTML = '<div class="empty-state">Sin resultados.</div>';
    return;
  }

  // Destruir charts anteriores
  Object.values(evolCharts).forEach(c => c.destroy());
  for(const k in evolCharts) delete evolCharts[k];

  const PALETTE = ['#1a4a9e','#1e6b18','#c0392b','#8a5a00','#4a1a9e','#0e6b5a','#6b1a6b','#1a6b6b'];

  document.getElementById('evol-cards').innerHTML = telaKeys.map(tela => {
    const info = telas[tela];
    const colores = Object.keys(info.colores);
    const todosIgualesFob = colores.every(c => {
      const fobs = info.colores[c].map(p=>p.fob);
      return fobs.every(f=>f===fobs[0]);
    });
    // Todos los labels de fecha únicos ordenados
    const allFechas = [...new Set(
      Object.values(info.colores).flat().map(p=>p.fecha)
    )].sort();
    const allLabels = allFechas.map(f => {
      const found = Object.values(info.colores).flat().find(p=>p.fecha===f);
      return found ? found.label : f;
    });

    const minFob = Math.min(...Object.values(info.colores).flat().map(p=>p.fob));
    const maxFob = Math.max(...Object.values(info.colores).flat().map(p=>p.fob));
    const canvasId = 'chart-evol-' + tela.replace(/\s+/g,'_');

    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div>
          <div style="font-weight:500;font-size:14px;">${tela}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">${[...info.proveedores].join(', ')}</div>
        </div>
        <div style="text-align:right;font-size:12px;color:var(--text3);">
          min <b style="color:var(--text2)">$${minFob.toFixed(2)}</b> · max <b style="color:var(--text2)">$${maxFob.toFixed(2)}</b>
        </div>
      </div>
      <div style="position:relative;height:180px;">
        <canvas id="${canvasId}" role="img" aria-label="Evolución FOB de ${tela}"></canvas>
      </div>
    </div>`;
  }).join('');

  // Renderizar charts después del DOM
  setTimeout(() => {
    telaKeys.forEach(tela => {
      const info = telas[tela];
      const colores = Object.keys(info.colores);
      const allFechas = [...new Set(
        Object.values(info.colores).flat().map(p=>p.fecha)
      )].sort();
      const allLabels = allFechas.map(f => {
        const found = Object.values(info.colores).flat().find(p=>p.fecha===f);
        return found ? found.label : f;
      });

      const todosIgualesFob = colores.length === 1 ||
        Object.values(info.colores).flat().map(p=>p.fob)
          .every((f,_,a)=>f===a[0]);

      const datasets = colores.map((color, i) => {
        const puntos = info.colores[color].sort((a,b)=>a.fecha.localeCompare(b.fecha));
        const dataMap = {};
        puntos.forEach(p => { dataMap[p.fecha] = p.fob; });
        return {
          label: todosIgualesFob ? tela : color,
          data: allFechas.map(f => dataMap[f] ?? null),
          borderColor: PALETTE[i % PALETTE.length],
          backgroundColor: PALETTE[i % PALETTE.length] + '18',
          pointBackgroundColor: PALETTE[i % PALETTE.length],
          pointRadius: 5,
          pointHoverRadius: 7,
          borderWidth: 2,
          tension: 0.3,
          spanGaps: false,
          fill: colores.length === 1,
        };
      });

      const canvasId = 'chart-evol-' + tela.replace(/\s+/g,'_');
      const ctx = document.getElementById(canvasId);
      if(!ctx) return;

      const allFobs = Object.values(info.colores).flat().map(p=>p.fob);
      const minY = Math.max(0, Math.min(...allFobs) * 0.85);
      const maxY = Math.max(...allFobs) * 1.15;

      evolCharts[tela] = new Chart(ctx, {
        type: 'line',
        data: { labels: allLabels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: colores.length > 1, position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, padding: 10 } },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}`
              }
            }
          },
          scales: {
            x: { ticks: { font: { size: 10 }, maxRotation: 35 }, grid: { color: '#e0dbd2' } },
            y: {
              min: minY, max: maxY,
              ticks: { font: { size: 10 }, callback: v => '$' + v.toFixed(2) },
              grid: { color: '#e0dbd2' }
            }
          }
        }
      });
    });
  }, 0);
}

// ── TAB SWITCH ──
function switchTab(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ── INIT ──
populateFilters();
renderFobs();
renderEstado();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
renderEvolucion();
</script>
